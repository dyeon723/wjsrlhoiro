<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회로이론 시험</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:#2e3350;--text:#e8eaf6;--text2:#9198b8;--text3:#5a6080;
  --accent:#5c7cfa;--accent2:#748ffc;--green:#51cf66;--red:#ff6b6b;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans KR",sans-serif;min-height:100vh;}

.top-bar{
  position:sticky;top:0;z-index:50;
  background:rgba(15,17,23,0.93);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.top-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
.top-title span{color:var(--accent2);}
.stats{display:flex;gap:8px;flex-wrap:wrap;}
.stat{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;color:var(--text2);font-family:"JetBrains Mono",monospace;}
.stat.good{border-color:var(--green);color:var(--green);background:rgba(81,207,102,0.08);}
.stat.bad{border-color:var(--red);color:var(--red);background:rgba(255,107,107,0.08);}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);}
.tbtn{padding:6px 13px;font-size:12px;font-family:"Noto Sans KR",sans-serif;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.danger:hover{border-color:var(--red);color:var(--red);}
.tbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(92,124,250,0.1);}

.content{max-width:720px;margin:0 auto;padding:24px 16px 80px;}
.section-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;transition:border-color .2s;}
.qcard.ok{border-color:rgba(81,207,102,0.35);}
.qcard.ng{border-color:rgba(255,107,107,0.35);}
.qcard.shown{border-color:rgba(92,124,250,0.3);}

.qmeta{font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:0.3px;}
.qnum{font-size:13px;color:var(--accent2);font-weight:500;margin-bottom:10px;font-family:"JetBrains Mono",monospace;}

/* 문제 텍스트 - inline katex */
.qtext{font-size:15px;line-height:1.8;margin-bottom:14px;}
.qtext .katex{font-size:1em;}

.qimg{margin-bottom:14px;text-align:center;}
.qimg img{max-width:100%;border-radius:8px;border:1px solid var(--border);}

/* 보기 */
.choices{display:flex;flex-direction:column;gap:7px;}
.choice{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;border:1px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:14px;line-height:1.6;
  transition:all .15s;background:transparent;color:var(--text);
  text-align:left;width:100%;font-family:"Noto Sans KR",sans-serif;
}
.choice:hover:not(:disabled){border-color:var(--accent);background:rgba(92,124,250,0.06);}
.choice.correct{border-color:var(--green);background:rgba(81,207,102,0.1);color:var(--green);}
.choice.wrong{border-color:var(--red);background:rgba(255,107,107,0.1);color:var(--red);}
.choice:disabled{cursor:default;}
.choice .katex{font-size:0.95em;}
.cnum{width:25px;height:25px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:"JetBrains Mono",monospace;}

/* 해설 */
.sol-wrap{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.sol-wrap.show{display:block;}
.sol-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--accent2);margin-bottom:8px;text-transform:uppercase;}
.sol-body{font-size:14px;line-height:2;color:var(--text2);}
.sol-txt{margin-bottom:4px;}
.sol-body .katex{font-size:1.05em;}
.sol-img{margin-bottom:12px;text-align:center;}
.sol-img img{max-width:100%;border-radius:8px;border:1px solid var(--border);}
.sol-extra{margin-top:14px;padding:14px;background:var(--bg3);border-radius:8px;border-left:2px solid var(--accent);}
.sol-extra-label{font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:8px;letter-spacing:0.5px;}

/* 주관식 */
.subj-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:12px;}
.subj-item label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;}
.subj-ans{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text2);line-height:1.8;display:none;}
.subj-ans.show{display:block;}
.subj-ans .katex{font-size:1em;}
.subj-img{text-align:center;margin-top:10px;}
.subj-img img{max-width:100%;border-radius:8px;border:1px solid var(--border);}

.abtn{padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-family:"Noto Sans KR",sans-serif;margin-top:12px;}
.abtn:hover{border-color:var(--accent);color:var(--accent);}
.abtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;}
.abtn.primary:hover{background:var(--accent2);border-color:var(--accent2);}

/* 공식 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--accent2);}
.formula-section{margin-bottom:22px;}
.formula-section h3{font-size:11px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.8px;}
.formula-item{background:var(--bg3);border-radius:8px;padding:12px 14px;margin-bottom:7px;font-size:13px;color:var(--text2);line-height:1.8;}
.formula-item .katex{font-size:1em;}
.modal-close{display:block;width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:14px;font-family:"Noto Sans KR",sans-serif;margin-top:4px;}
.modal-close:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-title">회로이론 <span>시험</span></div>
  <div class="stats">
    <span class="stat" id="st-total">0 / 15</span>
    <span class="stat" id="st-ok">정답 0</span>
    <span class="stat" id="st-rate">정답률 —</span>
  </div>
</div>
<div class="toolbar">
  <button class="tbtn" onclick="shuffleQ()">문제 섞기</button>
  <button class="tbtn" onclick="shuffleC()">보기 섞기</button>
  <button class="tbtn" onclick="toggleWrong()">오답노트</button>
  <button class="tbtn" onclick="showFormulas()">공식 모음</button>
  <button class="tbtn danger" onclick="resetAll()">전체 초기화</button>
</div>
<div class="content" id="content"></div>

<div class="modal-bg" id="fml-modal" onclick="if(event.target.id==='fml-modal')hideFml()">
  <div class="modal">
    <div class="modal-title">📐 공식 모음</div>
    <div id="fml-content"></div>
    <button class="modal-close" onclick="hideFml()">닫기</button>
  </div>
</div>

function kt(tex, display=false) {
  try {
    return katex.renderToString(tex, {throwOnError:false, displayMode:display});
  } catch(e) { return tex; }
}
// 문자열 내 $..$ 인라인 수식 렌더
function ktInline(str) {
  return str.replace(/\$([^$]+)\$/g, (_, t) => kt(t, false));
}

// ── 상태 ──
let questions=[...QS], results={}, shuffledC={}, wrongMode=false;

function getOrder(q){
  if(!shuffledC[q.id]) shuffledC[q.id]=q.choices.map((_,i)=>i);
  return shuffledC[q.id];
}

// ── 렌더 ──
function renderAll(){
  updateStats();
  const list = wrongMode
    ? questions.filter(q=>q.type==='obj'&&results[q.id]!==undefined&&results[q.id]!==q.ans)
    : questions;
  const objs=list.filter(q=>q.type==='obj');
  const subjs=list.filter(q=>q.type==='subj');
  let h='';
  if(objs.length){ h+='<div class="section-label">객관식</div>'; objs.forEach(q=>h+=buildObj(q)); }
  if(subjs.length){ h+='<div class="section-label">주관식</div>'; subjs.forEach(q=>h+=buildSubj(q)); }
  if(!list.length) h='<div style="text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;">표시할 문제가 없습니다.</div>';
  document.getElementById('content').innerHTML=h;
}

function buildObj(q){
  const r=results[q.id], answered=r!==undefined;
  const order=getOrder(q);
  const nums=['①','②','③','④'];
  const cardCls='qcard'+(answered?(r===q.ans?' ok':' ng'):'');

  const choicesH=order.map((oi,di)=>{
    let cls='choice';
    if(answered){ if(oi===q.ans)cls+=' correct'; else if(r===oi)cls+=' wrong'; }
    // 보기에 $..$ 있으면 katex 렌더
    const label = q.choices[oi].replace(/\$([^$]+)\$/g,(_,t)=>kt(t,false));
    return `<button class="${cls}" onclick="pick(${q.id},${oi})" ${answered?'disabled':''}><span class="cnum">${nums[di]}</span><span>${label}</span></button>`;
  }).join('');

  const solH = answered ? buildSol(q) : '';
  const qimgH = q.qimg ? `<div class="qimg">${img(q.qimg)}</div>` : '';

  return `<div class="${cardCls}" id="qc-${q.id}">
    <div class="qmeta">${q.ch}</div>
    <div class="qnum">Q${String(q.id).padStart(2,'0')}</div>
    <div class="qtext">${ktInline(q.qtext)}</div>
    ${qimgH}
    <div class="choices">${choicesH}</div>
    <div class="sol-wrap${answered?' show':''}" id="sol-${q.id}">${solH}</div>
  </div>`;
}

function buildSol(q){
  const simgH = q.simg ? `<div class="sol-img">${img(q.simg)}</div>` : '';
  const lines = q.sol.map(s=>{
    if(s.txt) return `<div class="sol-body sol-txt">${ktInline(s.txt)}</div>`;
    if(s.t)   return `<div class="sol-body">${kt(s.t, false)}</div>`;
    return '';
  }).join('');
  const extra = q.extra ? `<div class="sol-extra"><div class="sol-extra-label">📌 추가 해설</div>${q.extra.map(e=>{
    if(e.txt) return `<div class="sol-body sol-txt">${ktInline(e.txt)}</div>`;
    if(e.t)   return `<div class="sol-body">${kt(e.t, false)}</div>`;
    return '';
  }).join('')}</div>` : '';
  return `<div class="sol-label">해설</div>${simgH}${lines}${extra}`;
}

function buildSubj(q){
  const shown=results[q.id]==='shown';
  const cardCls='qcard'+(shown?' shown':'');
  const itemsH=q.items.map((item,i)=>{
    let c='';
    if(item.ktex)  c+=`<div style="margin-bottom:8px">${kt(item.ktex,false)}</div>`;
    if(item.ktex2) c+=`<div style="margin-bottom:8px">${kt(item.ktex2,false)}</div>`;
    if(item.ktex3) c+=`<div style="margin-bottom:8px">${kt(item.ktex3,false)}</div>`;
    if(item.txt)   c+=`<div>${item.txt}</div>`;
    if(item.img)   c+=`<div class="subj-img">${img(item.img)}</div>`;
    return `<div class="subj-item"><label>${item.label}</label><div class="subj-ans${shown?' show':''}">${c}</div></div>`;
  }).join('');
  return `<div class="${cardCls}" id="qc-${q.id}">
    <div class="qmeta">${q.ch}</div>
    <div class="qnum">Q${String(q.id).padStart(2,'0')}</div>
    <div class="qtext">${ktInline(q.qtext)}</div>
    <div class="subj-wrap">${itemsH}</div>
    <button class="abtn primary" onclick="toggleSubj(${q.id})">${shown?'답 숨기기':'답 보기'}</button>
  </div>`;
}

// ── 인터랙션 ──
function pick(qid, oi){
  const q=questions.find(x=>x.id===qid);
  if(!q||results[qid]!==undefined) return;
  results[qid]=oi;
  const card=document.getElementById('qc-'+qid);
  card.className='qcard'+(oi===q.ans?' ok':' ng');
  // 보기 업데이트
  const order=getOrder(q);
  card.querySelectorAll('.choice').forEach((btn,di)=>{
    const oidx=order[di]; btn.disabled=true;
    if(oidx===q.ans) btn.classList.add('correct');
    else if(oidx===oi) btn.classList.add('wrong');
  });
  // 해설 표시
  const sol=document.getElementById('sol-'+qid);
  sol.innerHTML=buildSol(q);
  sol.classList.add('show');
  updateStats();
}

function toggleSubj(qid){
  results[qid]=results[qid]==='shown'?undefined:'shown';
  const q=questions.find(x=>x.id===qid);
  const card=document.getElementById('qc-'+qid);
  card.outerHTML=buildSubj(q);
}

function updateStats(){
  const objs=questions.filter(q=>q.type==='obj');
  const answered=objs.filter(q=>results[q.id]!==undefined);
  const correct=answered.filter(q=>results[q.id]===q.ans);
  document.getElementById('st-total').textContent=answered.length+' / '+objs.length;
  document.getElementById('st-ok').textContent='정답 '+correct.length;
  const rate=answered.length?Math.round(correct.length/answered.length*100):null;
  const el=document.getElementById('st-rate');
  el.textContent='정답률 '+(rate!==null?rate+'%':'—');
  el.className='stat'+(rate!==null?(rate>=60?' good':' bad'):'');
}

function shuffleQ(){
  const a=[...questions];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  questions=a; wrongMode=false;
  document.querySelector('.tbtn[onclick="toggleWrong()"]').classList.remove('active');
  renderAll();
}
function shuffleC(){
  questions.filter(q=>q.type==='obj').forEach(q=>{
    const o=q.choices.map((_,i)=>i);
    for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];}
    shuffledC[q.id]=o;
  });
  renderAll();
}
function toggleWrong(){
  wrongMode=!wrongMode;
  document.querySelector('.tbtn[onclick="toggleWrong()"]').classList.toggle('active',wrongMode);
  renderAll();
}
function resetAll(){
  if(!confirm('모든 풀이 기록을 초기화할까요?')) return;
  results={}; shuffledC={}; questions=[...QS]; wrongMode=false;
  document.querySelector('.tbtn[onclick="toggleWrong()"]').classList.remove('active');
  renderAll();
}

// ── 공식 모달 ──
function showFormulas(){
  const modal=document.getElementById('fml-modal');
  const content=document.getElementById('fml-content');
  modal.classList.add('show');
  if(content.innerHTML) return;
  let h='';
  FORMULAS.forEach(sec=>{
    h+=`<div class="formula-section"><h3>${sec.sec}</h3>`;
    sec.items.forEach(item=>{
      h+=`<div class="formula-item">${item.lbl} &nbsp; ${kt(item.tex,false)}</div>`;
    });
    h+='</div>';
  });
  content.innerHTML=h;
}
function hideFml(){ document.getElementById('fml-modal').classList.remove('show'); }

renderAll();
</script>
</body>
